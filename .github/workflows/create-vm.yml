name: Oracle ARM 인스턴스 자동 생성

on:
  schedule:
    - cron: '*/15 * * * *'  # 매 30분마다 실행
  workflow_dispatch:         # 수동 실행 버튼 (테스트용)

jobs:
  create-instance:
    runs-on: ubuntu-latest

    steps:

      # ① OCI CLI 설치
      # Python 패키지로 배포되는 Oracle 공식 CLI 도구
      - name: OCI CLI 설치
        run: pip install oci-cli

      # ② OCI 인증 파일 구성
      # Secrets에서 값을 꺼내 실제 파일로 조립
      # 이 파일들은 워크플로우 종료 시 자동으로 사라짐
      - name: OCI 인증 설정
        run: |
          mkdir -p ~/.oci

          cat << EOF > ~/.oci/config
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=${{ secrets.OCI_REGION }}
          key_file=/home/runner/.oci/private_key.pem
          EOF

          chmod 600 ~/.oci/config

          # Private Key 파일 생성 후 권한 제한 (소유자만 읽기 가능)
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/private_key.pem
          chmod 600 ~/.oci/private_key.pem

          # SSH 공개키 임시 파일 생성
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > /tmp/ssh_key.pub

      # ③ 인스턴스 생성 시도 (핵심 단계)
      - name: 인스턴스 생성 시도
        id: create  # 이 id로 다음 단계에서 결과를 참조
        run: |
          # || true → OCI CLI가 에러 반환해도 워크플로우가 중단되지 않게 함
          OUTPUT=$(oci compute instance launch \
            --no-retry \
            --auth api_key \
            --display-name "arm-fastapi-server" \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --availability-domain "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":2,"memoryInGBs":12}' \
            --boot-volume-size-in-gbs 50 \
            --is-pv-encryption-in-transit-enabled true \
            --assign-public-ip true \
            --ssh-authorized-keys-file /tmp/ssh_key.pub \
            2>&1) || true

          echo "--- OCI 응답 ---"
          echo "$OUTPUT"

          # 응답 내용으로 상태 분기
          if echo "$OUTPUT" | grep -qi "Out of capacity\|Out of host capacity"; then
            echo "status=no_capacity" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -qi "TooManyRequests\|429"; then
            echo "status=rate_limited" >> $GITHUB_OUTPUT
          elif echo "$OUTPUT" | grep -qi "lifecycleState"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=error" >> $GITHUB_OUTPUT
          fi

      # ④ 실행 결과 요약 출력 (Actions 로그에서 확인)
      - name: 결과 출력
        run: |
          STATUS="${{ steps.create.outputs.status }}"
          case $STATUS in
            no_capacity)  echo "결과: 용량 부족 → 30분 후 자동 재시도" ;;
            rate_limited) echo "결과: 요청 과다 → 30분 후 자동 재시도" ;;
            success)      echo "결과: 🎉 인스턴스 생성 성공!" ;;
            error)        echo "결과: ⚠️ 알 수 없는 오류 → 로그 확인 필요" ;;
          esac

      # ⑤ 성공 시 GitHub Issue 생성 → 자동으로 이메일 알림 발송
      # GITHUB_TOKEN은 별도 설정 없이 Actions에서 자동 제공되는 토큰
      - name: 성공 알림 (Issue 생성)
        if: steps.create.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🎉 Oracle ARM 인스턴스 생성 성공!',
              body: [
                '## Oracle Cloud ARM 인스턴스가 생성되었습니다!',
                '',
                '**즉시 확인하세요:**',
                'https://cloud.oracle.com/compute/instances',
                '',
                `생성 시각: ${new Date().toLocaleString('ko-KR', {timeZone: 'Asia/Seoul'})}`,
              ].join('\n')
            })

      # ⑥ 성공 시 워크플로우 자동 비활성화
      # 인스턴스가 만들어진 후에도 계속 실행되면 불필요한 API 호출이 됨
      - name: 성공 시 워크플로우 비활성화
        if: steps.create.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.disableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'create-vm.yml'
            })
            console.log('워크플로우 비활성화 완료')